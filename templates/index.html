<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ollama UI</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-content">
        <ul class="session-list" id="sessionList">
          <!-- Sessions will be populated here -->
        </ul>
        <div class="empty-sessions" id="emptySessions" style="display: none;">
          No conversations yet
        </div>
        
        <!-- Projects Section -->
        <div class="projects-section" id="projectsSection">
          <div class="projects-header">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
            </svg>
            <span>Projects</span>
          </div>
          <ul class="project-list" id="projectList">
            <!-- Projects will be populated here -->
          </ul>
          <div class="empty-projects" id="emptyProjects" style="display: none;">
            No projects found
          </div>
        </div>
      </div>
      <div class="sidebar-footer">
        Ollama UI v1.0
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="overlay-backdrop" id="overlayBackdrop"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Chat Header -->
      <header class="chat-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
        <span class="chat-title" id="chatTitle">New Conversation</span>
        <div class="model-selector">
          <label for="modelSelect">Model:</label>
          <select id="modelSelect">
            <option value="" disabled selected>Loading...</option>
          </select>
          <button class="retry-connection-btn" id="retryConnectionBtn" style="display: none;" title="Retry connection to Ollama">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
          </button>
          <span class="connection-indicator" id="connectionIndicator" title="Ollama connection status">
            <span class="connection-dot connected"></span>
          </span>
        </div>
      </header>

      <!-- Chat Messages -->
      <div class="chat-container" id="chatContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <h1>Ollama UI</h1>
          <p>Start a new conversation or select an existing one from the sidebar.</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container" id="inputContainer">
          <div class="file-attachments" id="fileAttachments" style="display: none;"></div>
          <div class="input-row">
            <textarea 
              class="message-input" 
              id="messageInput" 
              placeholder="Type your message... (Enter to send, Ctrl+Enter for new line)"
              rows="1"
            ></textarea>
            <div class="input-actions">
              <button class="icon-btn" id="attachBtn" title="Attach files">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.122 2.122l7.81-7.81" />
                </svg>
              </button>
              <button class="send-btn" id="sendBtn" title="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Drag Drop Overlay -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-content">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
      </svg>
      <h3>Drop files here</h3>
      <p>Attach files to your message</p>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" class="file-input" id="fileInput" multiple>

  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
